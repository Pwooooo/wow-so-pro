        .page_pageWrap__T0b5I { position: relative; overflow: hidden; }

        .page_chooserNav__Otqyc { position: fixed; top: 14px; left: 20px; right: 20px; z-index: 1000; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-radius: 16px; background: hsla(0,0%,4%,.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid hsla(0,0%,100%,.06); }

        .page_chooserMain__aj8WG { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 140px 24px 100px; gap: 64px; }
