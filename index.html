<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, :after, :before { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0a; --text: #fff; --text-dim: #888; --text-muted: #444; --border: #1a1a1a; --silver: silver; }
        html { scroll-behavior: smooth; }
        body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.6; }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; outline: none; }
        img { max-width: 100%; display: block; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
        ::selection { background: hsla(0,0%,100%,.1); color: #fff; }

        .page_pageWrap__T0b5I { position: relative; overflow: hidden; }
        .page_waveBg__WD1VS { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .page_waveBg__WD1VS svg { width: 140%; height: 140%; position: absolute; top: -20%; left: -20%; transform-origin: center center; will-change: transform; contain: layout style; animation: page_swirlDrift__GvS2T 60s linear infinite; }
        @keyframes page_swirlDrift__GvS2T { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(4deg) scale(1.02); } to { transform: rotate(0deg) scale(1); } }

        .page_chooserNav__Otqyc { position: fixed; top: 14px; left: 20px; right: 20px; z-index: 1000; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-radius: 16px; background: hsla(0,0%,4%,.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid hsla(0,0%,100%,.06); }
        .page_chooserNavLogo__hclA4 { display: flex; align-items: center; }
        .page_chooserNavLogo__hclA4 img { height: 100px; width: auto; margin-left: -16px; transform: translateY(3px); }
        .page_chooserNavLinks__pIxKR { display: flex; align-items: center; gap: 24px; }
        .page_chooserNavLink__PYQZT { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text-dim); transition: color .2s; }
        .page_chooserNavLink__PYQZT:hover { color: #fff; }

        .page_chooserMain__aj8WG { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 140px 24px 100px; gap: 64px; }
        .page_chooserHeader__4F3D4 { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 18px; }
        .page_chooserTitle__EbMMG { font-family: Unbounded, sans-serif; font-size: clamp(56px, 8vw, 96px); font-weight: 800; letter-spacing: -2.5px; line-height: 1; display: flex; filter: drop-shadow(0 0 30px rgba(255,255,255,.15)); }
        .page_letterWave__jXaor { display: inline-block; background: linear-gradient(90deg, #555, #999, #fff, #999, #555); background-size: 600% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; will-change: background-position; animation: page_shimmer__G1aXL 4s ease-in-out infinite; animation-delay: calc(var(--i) * -.4s); }
        @keyframes page_shimmer__G1aXL { 0%, to { background-position: 100% 50%; } 50% { background-position: 0 50%; } }
        .page_chooserSubtitle__PbXhY { font-size: 15px; color: var(--text-dim); letter-spacing: .4px; display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px; line-height: 1.6; }
        .page_subLetter__iD4OT { display: inline-block; white-space: pre; }

        .page_chooserGrid__r8TXD { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; max-width: 820px; }
        .page_chooserCard__Qvehi { display: flex; flex-direction: column; align-items: flex-start; gap: 14px; padding: 36px 32px; border-radius: 16px; border: 1px solid hsla(0,0%,100%,.15); background: hsla(0,0%,100%,.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); text-decoration: none; transition: border-color .3s, background .3s, transform .3s, box-shadow .3s; position: relative; overflow: hidden; cursor: pointer; }
        .page_chooserCard__Qvehi:before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at top right, hsla(0,0%,100%,.07), transparent 55%); opacity: 0; transition: opacity .4s; pointer-events: none; }
        .page_chooserCard__Qvehi:hover { border-color: hsla(0,0%,100%,.3); background: hsla(0,0%,100%,.1); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,.4); }
        .page_chooserCard__Qvehi:hover:before { opacity: 1; }
        .page_chooserCardIcon__cVAax { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 10px; background: hsla(0,0%,100%,.06); border: 1px solid hsla(0,0%,100%,.1); color: #ccc; transition: color .3s, border-color .3s, background .3s; }
        .page_chooserCard__Qvehi:hover .page_chooserCardIcon__cVAax { color: #fff; border-color: hsla(0,0%,100%,.2); background: hsla(0,0%,100%,.1); }
        .page_chooserCardLabel__MHDMa { font-family: Unbounded, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
        .page_chooserCardTitle__wgKQF { font-family: Unbounded, sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -.8px; color: #fff; line-height: 1.1; }
        .page_chooserCardDesc__HVoqf { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
        .page_chooserCardPrice__cDkKQ { display: flex; align-items: baseline; gap: 8px; margin-top: 8px; }
        .page_chooserCardPriceNum__54Fd4 { font-family: Unbounded, sans-serif; font-size: 28px; font-weight: 800; background: linear-gradient(180deg, #fff 20%, #888); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .page_chooserCardPriceLabel__M3_yF { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
        .page_chooserCardCta__G002d { display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; font-family: Unbounded, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; transition: gap .3s; }
        .page_chooserCard__Qvehi:hover .page_chooserCardCta__G002d { gap: 12px; }
        .page_chooserCardCta__G002d svg { transition: transform .3s; }
        .page_chooserCard__Qvehi:hover .page_chooserCardCta__G002d svg { transform: translateX(2px); }

        .page_chooserFooter__6wBBa { position: relative; z-index: 1; padding: 24px 48px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 48px;
            border-radius: 12px;
            background: #5865F2;
            color: #fff;
            font-family: Unbounded, sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 24px rgba(88, 101, 242, 0.3);
        }

        .discord-btn:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(88, 101, 242, 0.4);
        }

        .discord-btn svg {
            width: 28px;
            height: 28px;
        }

        @media (max-width: 900px) {
            .page_chooserNav__Otqyc { padding: 0 16px; }
            .page_chooserNavLogo__hclA4 img { height: 70px; margin-left: -10px; }
            .page_chooserGrid__r8TXD { grid-template-columns: 1fr; gap: 16px; }
            .page_chooserMain__aj8WG { padding: 110px 20px 80px; gap: 48px; }
            .page_chooserFooter__6wBBa { flex-direction: column; gap: 8px; padding: 24px 20px; text-align: center; }
        }
    </style>
</head>
<body>

                    Discord

    <script>
        function animateText(element, text, delay, className) {
            element.innerHTML = '';
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                span.style.setProperty('--i', i);
                span.style.animationDelay = `${delay + i * 0.04}s`;
                if (className) span.className = className;
                element.appendChild(span);
            }
        }

        animateText(document.getElementById('title'), 'Novelo', 0.1, 'page_letterWave__jXaor');
        animateText(document.getElementById('subtitle'), 'Join The Discord', 0.6, 'page_subLetter__iD4OT');
    </script>
